spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: server

  # MongoDB Configuration (Spring Boot 4.x uses spring.mongodb instead of spring.data.mongodb)
  mongodb:
    uri: ${SPRING_MONGODB_URI}
    database: ${SPRING_MONGODB_DATABASE}

  # Mail Configuration (Gmail SMTP)
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Servlet configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # OAuth2 Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: user:email, read:user

# JWT Configuration
jwt:
  secretKey: ${JWT_SECRET_KEY}

# AWS Configuration
aws:
  accessKey: ${AWS_ACCESS_KEY}
  secretKey: ${AWS_SECRET_KEY}
  region: ${AWS_REGION}
  bucketName: ${AWS_BUCKET_NAME}

# RAG Service Configuration
render:
  api:
    # base-url: http://localhost:5000
    base-url: ${RENDER_API_BASE_URL}

# Frontend URL (used by OAuth2 success handler for redirect)
frontend:
  url: ${FRONTEND_URL}
