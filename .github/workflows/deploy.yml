name: CI CD for the final Year Project

on:
  push:
    branches: 
        - main
  workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node js
              uses: actions/setup-node@v6
              with:
                node-version: 21

            - name: Install dependencies
              run: npm install
              working-directory: ./client

            - name: Build client
              run: npm run build
              working-directory: ./client


        